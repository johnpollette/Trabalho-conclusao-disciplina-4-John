# CI de Nível 01 - Disparo Manual através de clique
# Nome da Pipeline 
name: Execucao Manual testes unitarios Mocha

# Gatilho para execução manual da pipeline
on:
  workflow_dispatch:

#Tarefas a serem executadas
jobs:
  #nome do job
  e2e-tests:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalção do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn

      #   instalação das dependências
      - name: Instalando dependências
        run: yarn

      # executar os testes
      - name: Executando testes 
        run: npm test
